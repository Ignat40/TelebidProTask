version: "3.9"

services:
  db:
    image: postgres:16
    container_name: csapp-db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: registrationdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d registrationdb"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  app:
    build: .
    container_name: csapp-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: registrationdb
      DB_USER: appuser
      DB_PASSWORD: apppassword
      APP_PORT: 8080

volumes:
  postgres_data: